name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          {
            echo "## Changes"
            echo
            if [ -z "$PREV" ]; then
              git log --pretty='- %s' "$TAG"
            else
              git log --pretty='- %s' "${PREV}..${TAG}"
              echo
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV}...${TAG}"
            fi
          } > notes.md
          cat notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          FLAGS="--latest"
          if [[ "$TAG" == *-* ]]; then
            FLAGS="--prerelease"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file notes.md \
            --verify-tag \
            $FLAGS
